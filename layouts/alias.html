{{/*
  Hugo лӮҙмһҘ alias лҢҖмІҙ вҖ” meta refreshлҠ” relURLлЎң кІҪлЎңл§Ң л‘җм–ҙ
  лЎңм»¬(hugo server)В·мһ„мқҳ baseURLм—җм„ң production лҸ„л©”мқёмңјлЎң нҠҖм§Җ м•ҠкІҢ н•ңлӢӨ.
  canonicalмқҖ м ҲлҢҖ URL мң м§Җ(мһҗлҸҷ мқҙлҸҷ м—ҶмқҢ, кІҖмғүмҡ©).
*/}}
<!DOCTYPE html>
<html lang="{{ site.Language.Lang | default "en" }}">
  <head>
    <meta charset="utf-8" />
    <title>{{ .Permalink }}</title>
    <link rel="canonical" href="{{ .Permalink }}" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="0; url={{ .Permalink | relURL }}" />
  </head>
  <body></body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<style>.title{font:700 54px sans-serif;fill:#102033}.sub{font:600 25px sans-serif;fill:#4b5563}.head{font:700 25px sans-serif;fill:#fff}.txt{font:600 20px sans-serif;fill:#102033}.small{font:500 16px sans-serif;fill:#334155}.green{fill:#0f7a4f}.navy{fill:#102033}.card{fill:#fff;stroke:#1f3145;stroke-width:2}.label{font:700 18px sans-serif;fill:#102033}.bottom{font:700 30px sans-serif;fill:#102033}</style>
<defs><marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#0f7a4f"/></marker></defs>
<rect width="1600" height="900" fill="#f8fafc"/>
<rect x="20" y="16" width="1560" height="45" rx="10" fill="#102033"/><text x="800" y="47" text-anchor="middle" class="head">실행용 예시 템플릿 — 블로그 독자를 위한 실무형 구조</text>
<text x="800" y="125" text-anchor="middle" class="title">CISO 실행 템플릿</text>
<text x="800" y="165" text-anchor="middle" class="sub">새 위험이 들어왔을 때, 조직이 실제로 어떻게 판단하고 움직일 것인가</text>

<g transform="translate(30,210)">
  <g><rect width="250" height="440" rx="15" class="card"/><rect width="250" height="54" rx="15" fill="#102033"/><text x="125" y="36" text-anchor="middle" class="head">1. 신규 위협 접수</text><text x="125" y="110" text-anchor="middle" font="700 48px sans-serif" fill="#102033">✉</text><text x="30" y="170" class="label">목적</text><text x="30" y="205" class="small">CVE, KEV, 버그바운티,</text><text x="30" y="230" class="small">내부 탐지, 외부 제보를</text><text x="30" y="255" class="small">단일 입력으로 정리</text><text x="30" y="315" class="label">핵심 질문</text><text x="30" y="350" class="small">무슨 위협이 들어왔는가?</text><text x="30" y="400" class="label">산출물</text><text x="30" y="430" class="small">위협 요약 · 출처 · 긴급도</text></g>
  <line x1="260" y1="220" x2="305" y2="220" stroke="#0f7a4f" stroke-width="6" marker-end="url(#arr)"/>
  <g transform="translate(320,0)"><rect width="250" height="440" rx="15" class="card"/><rect width="250" height="54" rx="15" fill="#102033"/><text x="125" y="36" text-anchor="middle" class="head">2. 영향 분석</text><text x="125" y="110" text-anchor="middle" font="700 48px sans-serif" fill="#102033">⌕</text><text x="30" y="170" class="label">목적</text><text x="30" y="205" class="small">대상 자산, 노출 여부,</text><text x="30" y="230" class="small">비즈니스 영향, 우선순위 판단</text><text x="30" y="315" class="label">핵심 질문</text><text x="30" y="350" class="small">우리 환경에 해당되는가?</text><text x="30" y="400" class="label">산출물</text><text x="30" y="430" class="small">영향 자산 목록 · 담당자 지정</text></g>
  <line x1="580" y1="220" x2="625" y2="220" stroke="#0f7a4f" stroke-width="6" marker-end="url(#arr)"/>
  <g transform="translate(640,0)"><rect width="250" height="440" rx="15" class="card"/><rect width="250" height="54" rx="15" fill="#102033"/><text x="125" y="36" text-anchor="middle" class="head">3. 임시 대응</text><text x="125" y="110" text-anchor="middle" font="700 48px sans-serif" fill="#0f7a4f">▣</text><text x="30" y="170" class="label">목적</text><text x="30" y="205" class="small">패치 전 가능한 차단·격리,</text><text x="30" y="230" class="small">설정 변경·대체 통제 적용</text><text x="30" y="315" class="label">핵심 질문</text><text x="30" y="350" class="small">지금 무엇을 줄일 수 있는가?</text><text x="30" y="400" class="label">산출물</text><text x="30" y="430" class="small">완화책 · 시행 시각 · 책임자</text></g>
  <line x1="900" y1="220" x2="945" y2="220" stroke="#0f7a4f" stroke-width="6" marker-end="url(#arr)"/>
  <g transform="translate(960,0)"><rect width="250" height="440" rx="15" class="card"/><rect width="250" height="54" rx="15" fill="#102033"/><text x="125" y="36" text-anchor="middle" class="head">4. 재탐색</text><text x="125" y="110" text-anchor="middle" font="700 48px sans-serif" fill="#0f7a4f">◎</text><text x="30" y="170" class="label">목적</text><text x="30" y="205" class="small">로그, 자산, 코드에서</text><text x="30" y="230" class="small">유사 흔적과 확산 가능성 확인</text><text x="30" y="315" class="label">핵심 질문</text><text x="30" y="350" class="small">같은 패턴이 다른 곳에도?</text><text x="30" y="400" class="label">산출물</text><text x="30" y="430" class="small">재탐색 결과 · 추가 조치 대상</text></g>
  <line x1="1220" y1="220" x2="1265" y2="220" stroke="#0f7a4f" stroke-width="6" marker-end="url(#arr)"/>
  <g transform="translate(1280,0)"><rect width="250" height="440" rx="15" class="card"/><rect width="250" height="54" rx="15" fill="#102033"/><text x="125" y="36" text-anchor="middle" class="head">5. 검증 및 반영</text><text x="125" y="110" text-anchor="middle" font="700 48px sans-serif" fill="#0f7a4f">✓</text><text x="30" y="170" class="label">목적</text><text x="30" y="205" class="small">조치 효과를 검증하고,</text><text x="30" y="230" class="small">교훈을 다음 통제로 연결</text><text x="30" y="315" class="label">핵심 질문</text><text x="30" y="350" class="small">다음 통제를 바꾸었는가?</text><text x="30" y="400" class="label">산출물</text><text x="30" y="430" class="small">사후 기록 · 교훈 · 정책 반영</text></g>
</g>
<rect x="45" y="690" width="1510" height="75" rx="15" fill="#fff" stroke="#94a3b8"/><text x="115" y="735" class="txt" fill="#0f7a4f">운영 원칙</text><text x="270" y="735" class="small">빠르게 인지 → 근거 기반 판단 → 즉시 위험 감소 → 보이지 않는 곳까지 확인 → 학습하고 반영</text>
<rect x="50" y="805" width="1500" height="65" rx="15" fill="#fff7ed" stroke="#fdba74"/><text x="800" y="848" text-anchor="middle" class="bottom">핵심 메시지: 자율 판단은 무기록 상태가 아니라, 빠른 판단과 명확한 기록 위에서 작동해야 한다.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">MCP configuration-to-execution trust boundary</title>
  <desc id="desc">Slide-derived diagram showing external input moving through an AI agent into mcp.json configuration and then command execution.</desc>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#e6e2d8" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .title{font:700 42px 'Noto Sans KR','Apple SD Gothic Neo',Arial,sans-serif;fill:#1f2937}
      .subtitle{font:500 20px 'Noto Sans KR','Apple SD Gothic Neo',Arial,sans-serif;fill:#475569}
      .boxText{font:700 25px 'Noto Sans KR','Apple SD Gothic Neo',Arial,sans-serif;fill:#111827;text-anchor:middle}
      .small{font:500 18px 'Noto Sans KR','Apple SD Gothic Neo',Arial,sans-serif;fill:#334155}
      .quote{font:700 24px 'Noto Sans KR','Apple SD Gothic Neo',Arial,sans-serif;fill:#1e293b}
      .caption{font:600 18px 'Noto Sans KR','Apple SD Gothic Neo',Arial,sans-serif;fill:#475569}
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f7f4eb"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.55"/>
  <rect x="28" y="28" width="1144" height="619" rx="18" fill="none" stroke="#273449" stroke-width="2" opacity="0.28"/>

  <text x="70" y="88" class="title">MCP의 핵심 위험: 설정이 실행으로 승격되는 순간</text>
  <text x="72" y="122" class="subtitle">외부 입력 → AI 에이전트 → mcp.json → 명령 실행(RCE)</text>

  <g transform="translate(55 190)" filter="url(#shadow)">
    <rect x="0" y="0" width="190" height="100" rx="14" fill="#fffdf7" stroke="#334155" stroke-width="2"/>
    <text x="95" y="45" class="boxText">외부 입력</text>
    <text x="95" y="75" class="small" text-anchor="middle">문서 · README · 이슈</text>
  </g>
  <line x1="255" y1="240" x2="340" y2="240" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>

  <g transform="translate(355 190)" filter="url(#shadow)">
    <rect x="0" y="0" width="190" height="100" rx="14" fill="#fffdf7" stroke="#334155" stroke-width="2"/>
    <text x="95" y="45" class="boxText">AI 에이전트</text>
    <text x="95" y="75" class="small" text-anchor="middle">추천 · 자동화 · 승인</text>
  </g>
  <line x1="555" y1="240" x2="640" y2="240" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>

  <g transform="translate(655 190)" filter="url(#shadow)">
    <rect x="0" y="0" width="190" height="100" rx="14" fill="#fffdf7" stroke="#334155" stroke-width="2"/>
    <text x="95" y="42" class="boxText">mcp.json</text>
    <text x="95" y="74" class="small" text-anchor="middle">command · args · endpoint</text>
  </g>
  <line x1="855" y1="240" x2="940" y2="240" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>

  <g transform="translate(955 190)" filter="url(#shadow)">
    <rect x="0" y="0" width="190" height="100" rx="14" fill="#b64234" stroke="#7f1d1d" stroke-width="2"/>
    <text x="95" y="45" class="boxText" fill="#fff">명령 실행</text>
    <text x="95" y="75" class="small" fill="#fee2e2" text-anchor="middle">RCE · 내부 API · 파일</text>
  </g>

  <g transform="translate(120 355)">
    <rect x="0" y="0" width="960" height="64" rx="10" fill="#fffdf7" stroke="#334155" stroke-width="2"/>
    <text x="480" y="40" class="quote" text-anchor="middle">단순한 코드 결함이 아니라, 설계상의 신뢰 경계 붕괴다.</text>
  </g>

  <g transform="translate(120 455)">
    <rect x="0" y="0" width="450" height="76" rx="10" fill="#eef6ff" stroke="#334155" stroke-width="2"/>
    <text x="225" y="32" class="caption" text-anchor="middle">과거 RPC</text>
    <text x="225" y="58" class="small" text-anchor="middle">사용자 입력 → 검증 → 실행</text>
  </g>
  <g transform="translate(630 455)">
    <rect x="0" y="0" width="450" height="76" rx="10" fill="#fff1f1" stroke="#b64234" stroke-width="2"/>
    <text x="225" y="32" class="caption" text-anchor="middle">현재 MCP</text>
    <text x="225" y="58" class="small" text-anchor="middle">외부 입력 → AI 매개 → 설정값 → 실행</text>
  </g>

  <rect x="90" y="575" width="1020" height="48" rx="8" fill="#e8eef6" stroke="#334155" stroke-width="1.5"/>
  <text x="600" y="606" class="quote" text-anchor="middle">사용자는 ‘설정’이라고 믿지만, 시스템은 이를 ‘실행’으로 받아들인다.</text>
</svg>

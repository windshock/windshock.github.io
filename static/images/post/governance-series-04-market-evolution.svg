<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<style>.title{font:700 54px sans-serif;fill:#102033}.sub{font:600 25px sans-serif;fill:#4b5563}.head{font:700 31px sans-serif;fill:#fff}.txt{font:700 24px sans-serif;fill:#102033}.small{font:500 18px sans-serif;fill:#334155}.box{fill:#fff;stroke-width:3;rx:16}.red{stroke:#e84d2a}.blue{stroke:#102033}.green{stroke:#0f7a4f}.label{font:700 22px sans-serif;fill:#102033}</style>
<defs><marker id="redarr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#e84d2a"/></marker><marker id="bluearr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#102033"/></marker><marker id="greenarr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#0f7a4f"/></marker></defs>
<rect width="1600" height="900" fill="#f8fafc"/>
<text x="800" y="70" text-anchor="middle" class="title">시장이 거버넌스를 끌고 가는 경로</text>
<text x="800" y="110" text-anchor="middle" class="sub">정책이 먼저 움직이지 않아도, 보험·고객사·공급망은 적응 능력을 요구할 수 있다</text>

<rect x="60" y="150" width="410" height="520" rx="18" fill="#fff" stroke="#e84d2a" stroke-width="3"/><rect x="60" y="150" width="410" height="62" rx="18" fill="#e84d2a"/><text x="265" y="191" text-anchor="middle" class="head">외부 압력</text>
<g class="small"><rect x="100" y="245" width="330" height="78" rx="12" fill="#fff" stroke="#e84d2a"/><text x="135" y="277" class="txt" fill="#e84d2a">1 사이버 보험</text><text x="155" y="305">보험료와 조건이 반응 지표를 요구</text><rect x="100" y="345" width="330" height="78" rx="12" fill="#fff" stroke="#e84d2a"/><text x="135" y="377" class="txt" fill="#e84d2a">2 고객사 요구</text><text x="155" y="405">조달·계약에서 대응 능력 확인</text><rect x="100" y="445" width="330" height="78" rx="12" fill="#fff" stroke="#e84d2a"/><text x="135" y="477" class="txt" fill="#e84d2a">3 공급망 평가</text><text x="155" y="505">협력사 보안 수준을 속도로 검증</text><rect x="100" y="545" width="330" height="78" rx="12" fill="#fff" stroke="#e84d2a"/><text x="135" y="577" class="txt" fill="#e84d2a">4 글로벌 규범</text><text x="155" y="605">국제 표준과 해외 시장 압력</text></g>

<rect x="595" y="150" width="410" height="520" rx="18" fill="#fff" stroke="#102033" stroke-width="3"/><rect x="595" y="150" width="410" height="62" rx="18" fill="#102033"/><text x="800" y="191" text-anchor="middle" class="head">기업 내부 변화</text>
<g><rect x="645" y="255" width="310" height="85" rx="12" fill="#fff" stroke="#102033"/><text x="800" y="290" text-anchor="middle" class="txt">CISO와 보안팀</text><text x="800" y="318" text-anchor="middle" class="small">적응 지표 도입</text><rect x="645" y="385" width="310" height="85" rx="12" fill="#fff" stroke="#102033"/><text x="800" y="420" text-anchor="middle" class="txt">솔루션·컨설팅 시장</text><text x="800" y="448" text-anchor="middle" class="small">새 요구에 맞는 서비스 재편</text><rect x="645" y="515" width="310" height="85" rx="12" fill="#fff" stroke="#102033"/><text x="800" y="550" text-anchor="middle" class="txt">경영진</text><text x="800" y="578" text-anchor="middle" class="small">리스크 관리 언어로 재인식</text></g>

<rect x="1130" y="150" width="410" height="520" rx="18" fill="#fff" stroke="#0f7a4f" stroke-width="3"/><rect x="1130" y="150" width="410" height="62" rx="18" fill="#0f7a4f"/><text x="1335" y="191" text-anchor="middle" class="head">거버넌스의 추격</text>
<g><rect x="1175" y="255" width="320" height="85" rx="12" fill="#fff" stroke="#0f7a4f"/><text x="1335" y="290" text-anchor="middle" class="txt">1 평가 항목 조정</text><text x="1335" y="318" text-anchor="middle" class="small">보유 여부에서 반응 시간 지표로</text><rect x="1175" y="385" width="320" height="85" rx="12" fill="#fff" stroke="#0f7a4f"/><text x="1335" y="420" text-anchor="middle" class="txt">2 인증·감사 해석 변화</text><text x="1335" y="448" text-anchor="middle" class="small">자율 조치와 기록을 폭넓게 인정</text><rect x="1175" y="515" width="320" height="85" rx="12" fill="#fff" stroke="#0f7a4f"/><text x="1335" y="550" text-anchor="middle" class="txt">3 정책 반영</text><text x="1335" y="578" text-anchor="middle" class="small">적응 능력 중심의 제도화</text></g>

<path d="M470 285 L595 298" stroke="#e84d2a" stroke-width="5" fill="none" marker-end="url(#redarr)"/><path d="M470 385 L595 428" stroke="#e84d2a" stroke-width="5" fill="none" marker-end="url(#redarr)"/><path d="M470 485 L595 558" stroke="#e84d2a" stroke-width="5" fill="none" marker-end="url(#redarr)"/><path d="M470 585 L595 558" stroke="#e84d2a" stroke-width="5" fill="none" marker-end="url(#redarr)"/>
<path d="M955 298 L1175 298" stroke="#102033" stroke-width="5" fill="none" marker-end="url(#bluearr)"/><path d="M955 428 L1175 428" stroke="#102033" stroke-width="5" fill="none" marker-end="url(#bluearr)"/><path d="M955 558 L1175 558" stroke="#102033" stroke-width="5" fill="none" marker-end="url(#bluearr)"/>
<path d="M1440 635 C1220 720 880 735 705 645" stroke="#0f7a4f" stroke-width="4" fill="none" stroke-dasharray="8 7" marker-end="url(#greenarr)"/><rect x="565" y="690" width="850" height="45" rx="12" fill="#ecfdf5" stroke="#0f7a4f"/><text x="990" y="720" text-anchor="middle" font="700 21px sans-serif" fill="#0f7a4f">시장 변화가 제도 변화를 자극하고, 제도 변화가 다시 시장을 확산시킴</text>

<rect x="60" y="755" width="1480" height="60" rx="12" fill="#fff" stroke="#94a3b8"/><text x="140" y="792" class="txt">기존 경로</text><text x="300" y="792" class="small">정책 → 평가 → 기업</text><text x="790" y="792" class="txt" fill="#0f7a4f">대안 경로</text><text x="970" y="792" class="small" fill="#0f7a4f">시장 → 기업 → 평가·정책</text>
<rect x="60" y="835" width="1480" height="48" rx="12" fill="#fff7ed" stroke="#fdba74"/><text x="800" y="866" text-anchor="middle" font="700 26px sans-serif" fill="#102033">핵심 메시지: 변화의 문은 정책기관만이 아니라, 시장과 거래 관계에서도 열린다.</text>
</svg>
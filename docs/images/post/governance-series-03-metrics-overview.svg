<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<style>.title{font:700 54px sans-serif;fill:#102033}.sub{font:600 26px sans-serif;fill:#4b5563}.h{font:700 38px sans-serif}.txt{font:600 21px sans-serif;fill:#102033}.small{font:500 17px sans-serif;fill:#334155}.card{fill:#fff;stroke-width:3;rx:20}.blue{stroke:#1e3a5f}.green{stroke:#0f7a4f}.badge{font:700 24px sans-serif;fill:#fff}.q{font:700 21px sans-serif;fill:#fff}.bottom{font:700 30px sans-serif;fill:#fff}.yellow{fill:#fde047}</style>
<defs><marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#0f7a4f"/></marker></defs>
<rect width="1600" height="900" fill="#f8fafc"/>
<text x="800" y="70" text-anchor="middle" class="title">적응 능력을 보는 미니 지표</text>
<text x="800" y="110" text-anchor="middle" class="sub">보유 여부가 아니라, 새 위험에 얼마나 빨리 반응하고 학습하는가를 측정한다</text>
<rect x="330" y="135" width="940" height="44" rx="12" fill="#fff" stroke="#94a3b8"/><text x="800" y="165" text-anchor="middle" class="txt">예시 지표: 공식 표준이 아니라, 평가 재설계를 위한 실무적 출발점</text>

<g transform="translate(40,210)"><rect width="490" height="470" rx="20" fill="#fff" stroke="#1e3a5f" stroke-width="3"/><text x="245" y="65" text-anchor="middle" class="h" fill="#1e3a5f">MTTA</text><text x="245" y="105" text-anchor="middle" class="txt">평균 영향 분석 시간</text><line x1="30" y1="130" x2="460" y2="130" stroke="#94a3b8" stroke-dasharray="5 5"/><text x="245" y="170" text-anchor="middle" class="small">신규 위협 정보 수신부터, 우리 환경에 미치는</text><text x="245" y="195" text-anchor="middle" class="small">영향 판단이 완료될 때까지의 시간</text><circle cx="110" cy="270" r="42" fill="#e0f2fe" stroke="#1e3a5f"/><text x="110" y="278" text-anchor="middle" font="700 30px sans-serif" fill="#1e3a5f">1</text><circle cx="245" cy="270" r="42" fill="#e0f2fe" stroke="#1e3a5f"/><text x="245" y="278" text-anchor="middle" font="700 30px sans-serif" fill="#1e3a5f">2</text><circle cx="380" cy="270" r="42" fill="#e0f2fe" stroke="#1e3a5f"/><text x="380" y="278" text-anchor="middle" font="700 30px sans-serif" fill="#1e3a5f">3</text><line x1="152" y1="270" x2="203" y2="270" stroke="#1e3a5f" stroke-width="4" marker-end="url(#arr)"/><line x1="287" y1="270" x2="338" y2="270" stroke="#1e3a5f" stroke-width="4" marker-end="url(#arr)"/><text x="110" y="345" text-anchor="middle" class="small">위협 정보 수신</text><text x="245" y="345" text-anchor="middle" class="small">자산 식별</text><text x="380" y="345" text-anchor="middle" class="small">영향 판단 완료</text><rect x="30" y="375" width="430" height="50" rx="10" fill="#1e3a5f"/><text x="245" y="407" text-anchor="middle" class="q">어디에, 얼마나, 왜 중요한가?</text><text x="245" y="455" text-anchor="middle" class="small">예시 증빙: 대상 자산 목록 · 우선순위 · 담당자 기록</text></g>

<g transform="translate(555,210)"><rect width="490" height="470" rx="20" fill="#fff" stroke="#0f7a4f" stroke-width="3"/><text x="245" y="65" text-anchor="middle" class="h" fill="#0f7a4f">MTTP</text><text x="245" y="105" text-anchor="middle" class="txt">평균 보호 조치 시간</text><line x1="30" y1="130" x2="460" y2="130" stroke="#94a3b8" stroke-dasharray="5 5"/><text x="245" y="170" text-anchor="middle" class="small">영향 판단 완료부터, 패치 또는 임시 완화 조치가</text><text x="245" y="195" text-anchor="middle" class="small">실제로 적용될 때까지의 시간</text><circle cx="110" cy="270" r="42" fill="#dcfce7" stroke="#0f7a4f"/><text x="110" y="278" text-anchor="middle" font="700 30px sans-serif" fill="#0f7a4f">1</text><circle cx="245" cy="270" r="42" fill="#dcfce7" stroke="#0f7a4f"/><text x="245" y="278" text-anchor="middle" font="700 30px sans-serif" fill="#0f7a4f">2</text><circle cx="380" cy="270" r="42" fill="#dcfce7" stroke="#0f7a4f"/><text x="380" y="278" text-anchor="middle" font="700 30px sans-serif" fill="#0f7a4f">3</text><line x1="152" y1="270" x2="203" y2="270" stroke="#0f7a4f" stroke-width="4" marker-end="url(#arr)"/><line x1="287" y1="270" x2="338" y2="270" stroke="#0f7a4f" stroke-width="4" marker-end="url(#arr)"/><text x="110" y="345" text-anchor="middle" class="small">영향 판단</text><text x="245" y="345" text-anchor="middle" class="small">패치 계획</text><text x="380" y="345" text-anchor="middle" class="small">임시 완화·패치</text><rect x="30" y="375" width="430" height="50" rx="10" fill="#0f7a4f"/><text x="245" y="407" text-anchor="middle" class="q">분석을 조치로 얼마나 빨리 연결했는가?</text><text x="245" y="455" text-anchor="middle" class="small">예시 증빙: 차단 룰 · 설정 변경 · 패치 적용 기록</text></g>

<g transform="translate(1070,210)"><rect width="490" height="470" rx="20" fill="#fff" stroke="#0f7a4f" stroke-width="3"/><text x="245" y="65" text-anchor="middle" class="h" fill="#0f7a4f">MTRS</text><text x="245" y="105" text-anchor="middle" class="txt">평균 재탐색 시간</text><line x1="30" y1="130" x2="460" y2="130" stroke="#94a3b8" stroke-dasharray="5 5"/><text x="245" y="170" text-anchor="middle" class="small">새 패턴·IOC·취약 경로를 받은 뒤, 전체 환경에서</text><text x="245" y="195" text-anchor="middle" class="small">유사 흔적을 재탐색해 결과를 확보하기까지의 시간</text><circle cx="110" cy="270" r="42" fill="#dcfce7" stroke="#0f7a4f"/><text x="110" y="278" text-anchor="middle" font="700 30px sans-serif" fill="#0f7a4f">1</text><circle cx="245" cy="270" r="42" fill="#dcfce7" stroke="#0f7a4f"/><text x="245" y="278" text-anchor="middle" font="700 30px sans-serif" fill="#0f7a4f">2</text><circle cx="380" cy="270" r="42" fill="#dcfce7" stroke="#0f7a4f"/><text x="380" y="278" text-anchor="middle" font="700 30px sans-serif" fill="#0f7a4f">3</text><line x1="152" y1="270" x2="203" y2="270" stroke="#0f7a4f" stroke-width="4" marker-end="url(#arr)"/><line x1="287" y1="270" x2="338" y2="270" stroke="#0f7a4f" stroke-width="4" marker-end="url(#arr)"/><text x="110" y="345" text-anchor="middle" class="small">새 패턴 수신</text><text x="245" y="345" text-anchor="middle" class="small">재탐색 실행</text><text x="380" y="345" text-anchor="middle" class="small">결과 확보·공유</text><rect x="30" y="375" width="430" height="50" rx="10" fill="#0f7a4f"/><text x="245" y="407" text-anchor="middle" class="q">전체 환경의 재점검으로 확장했는가?</text><text x="245" y="455" text-anchor="middle" class="small">예시 증빙: 재탐색 쿼리 · 탐지 결과 · 후속 조치</text></g>

<rect x="70" y="710" width="1460" height="80" rx="16" fill="#fff" stroke="#cbd5e1"/><text x="215" y="760" text-anchor="middle" class="txt">체크리스트 평가:<tspan x="215" dy="30">무엇을 갖췄는가</tspan></text><text x="800" y="760" text-anchor="middle" class="txt" fill="#0f7a4f">적응 능력 평가:<tspan x="800" dy="30">얼마나 빨리 판단했는가</tspan></text><text x="1320" y="760" text-anchor="middle" class="txt" fill="#0f7a4f">학습 능력 평가:<tspan x="1320" dy="30">결과를 다음 통제에 반영했는가</tspan></text>
<rect x="80" y="825" width="1440" height="55" rx="14" fill="#102033"/><text x="800" y="862" text-anchor="middle" class="bottom">핵심 원칙: 평가는 ‘도구 보유’보다 ‘판단·조치·재탐색의 속도’를 봐야 한다.</text>
</svg>